<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kibera Family Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
:root {
  --copper: #C27B5C;
  --charcoal: #2D2D2D;
  --text-med: #6B6B6B;
  --text-light: #999999;
  --warm-gray: #F5F3EF;
  --card-bg: #F7F5F1;
  --card-border: #EAE6DF;
  --line-soft: #E5E0DA;
  --white: #FFFFFF;
  --font-heading: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Source Serif 4', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-body);
  color: var(--charcoal);
  background: var(--white);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 24px 60px;
  background: linear-gradient(135deg, #1E3A5F 0%, #2D5F8A 40%, #C27B5C 100%);
}
.hero-eyebrow {
  font-family: var(--font-body);
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 16px;
}
.hero h1 {
  font-family: var(--font-heading);
  font-weight: 300;
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  color: var(--white);
  line-height: 1.15;
}
.hero h1 em { font-style: italic; font-weight: 300; }
.hero-divider {
  width: 50px;
  height: 1px;
  background: var(--copper);
  margin: 24px auto;
  opacity: 0.6;
}
.hero-sub {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.75);
  font-weight: 300;
}

/* TRIPS */
.trips {
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 24px 80px;
  flex: 1;
}
.trips h2 {
  font-family: var(--font-heading);
  font-weight: 400;
  font-size: 1.6rem;
  color: var(--charcoal);
  margin-bottom: 32px;
  text-align: center;
}
.trip-card {
  display: flex;
  gap: 28px;
  align-items: center;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 28px 32px;
  margin-bottom: 20px;
  text-decoration: none;
  color: inherit;
  transition: box-shadow 0.25s, transform 0.2s;
}
.trip-card:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,0.08);
  transform: translateY(-2px);
  text-decoration: none;
}
.trip-thumb {
  width: 140px;
  height: 95px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
}
.trip-info { flex: 1; }
.trip-info h3 {
  font-family: var(--font-heading);
  font-weight: 500;
  font-size: 1.4rem;
  color: var(--charcoal);
  margin-bottom: 6px;
}
.trip-info .trip-meta {
  font-size: 0.82rem;
  color: var(--text-med);
  font-weight: 300;
  margin-bottom: 8px;
}
.trip-info .trip-desc {
  font-size: 0.9rem;
  color: var(--text-med);
  font-weight: 300;
  line-height: 1.6;
}
.trip-arrow {
  font-size: 1.4rem;
  color: var(--copper);
  flex-shrink: 0;
}

@media (max-width: 600px) {
  .trip-card { flex-direction: column; text-align: center; gap: 16px; }
  .trip-thumb { width: 100%; height: 160px; }
  .trip-arrow { display: none; }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 28px 24px;
  border-top: 1px solid var(--line-soft);
  font-size: 0.75rem;
  color: var(--text-light);
  font-weight: 300;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-eyebrow">Kibera Family</div>
  <h1><em>Travel</em></h1>
  <div class="hero-divider"></div>
  <p class="hero-sub">Trip guides and itineraries</p>
</header>

<main class="trips">
  <h2>Trips</h2>

  <a href="south-pacific-2026/" class="trip-card">
    <img src="south-pacific-2026/images/fiji.jpg" alt="South Pacific" class="trip-thumb">
    <div class="trip-info">
      <h3>South Pacific</h3>
      <div class="trip-meta">Christmas 2026 &nbsp;·&nbsp; Dec 18 – Jan 2 &nbsp;·&nbsp; 5 Destinations</div>
      <p class="trip-desc">Fakarava, Fiji, Aitutaki, Samoa, and Rangiroa — flights, resorts, dining, and activities compared for the whole family.</p>
    </div>
    <span class="trip-arrow">&rarr;</span>
  </a>

  <!-- Future trips go here — just add another trip-card block -->

</main>

<footer>Kibera Family Travel</footer>

</body>
</html>
